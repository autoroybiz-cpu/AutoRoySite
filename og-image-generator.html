<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Heebo', Arial, sans-serif;
    background: #080b14;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Orbs */
  .orb1 {
    position: absolute;
    width: 600px; height: 600px;
    top: -200px; right: -100px;
    background: radial-gradient(circle, rgba(124,58,237,0.35) 0%, transparent 65%);
    border-radius: 50%;
    filter: blur(40px);
  }
  .orb2 {
    position: absolute;
    width: 400px; height: 400px;
    bottom: -150px; left: 0;
    background: radial-gradient(circle, rgba(6,182,212,0.25) 0%, transparent 65%);
    border-radius: 50%;
    filter: blur(40px);
  }

  /* Grid mesh */
  .mesh {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(139,92,246,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(139,92,246,0.06) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Content */
  .content {
    position: relative;
    z-index: 1;
    text-align: right;
    padding: 0 80px;
    width: 100%;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(139,92,246,0.15);
    border: 1px solid rgba(139,92,246,0.30);
    border-radius: 100px;
    padding: 6px 18px;
    font-size: 15px;
    font-weight: 700;
    color: #a78bfa;
    margin-bottom: 28px;
    letter-spacing: 0.03em;
  }
  .badge-dot {
    width: 7px; height: 7px;
    background: #a78bfa;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  h1 {
    font-size: 68px;
    font-weight: 900;
    line-height: 1.1;
    color: #f1f5f9;
    margin-bottom: 22px;
    letter-spacing: -2px;
  }
  h1 span {
    background: linear-gradient(135deg, #a78bfa 0%, #38bdf8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .sub {
    font-size: 24px;
    color: rgba(148,163,184,0.75);
    font-weight: 400;
    line-height: 1.5;
    max-width: 720px;
  }

  /* Logo bottom left */
  .logo {
    position: absolute;
    bottom: 44px;
    left: 80px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 2;
  }
  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #7c3aed, #0ea5e9);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-text {
    font-size: 20px;
    font-weight: 800;
    color: #f1f5f9;
    letter-spacing: -0.5px;
  }
  .logo-text span { color: #a78bfa; }

  /* URL bottom right */
  .url {
    position: absolute;
    bottom: 50px;
    right: 80px;
    font-size: 16px;
    color: rgba(148,163,184,0.40);
    z-index: 2;
    letter-spacing: 0.02em;
  }

  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800;900&display=swap');
</style>
</head>
<body>
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="mesh"></div>

  <div class="content">
    <div class="badge">
      <div class="badge-dot"></div>
      אוטומציות לעסקים קטנים בישראל
    </div>
    <h1>חסוך <span>23+ שעות</span><br>בחודש — אוטומטית</h1>
    <p class="sub">מוואטסאפ שעונה לבד ועד CRM שמתעדכן אוטומטית.<br>בונים מערכות שעובדות בשבילך 24/7.</p>
  </div>

  <div class="logo">
    <div class="logo-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
    </div>
    <div class="logo-text">AutoRoy <span>AI</span></div>
  </div>

  <div class="url">autoroy.co.il</div>
</body>
</html>
